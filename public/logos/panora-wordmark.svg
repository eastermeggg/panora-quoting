<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" fill="none">
  <!-- Sunburst icon -->
  <g transform="translate(20, 20)">
    <!-- Center dot -->
    <circle cx="0" cy="0" r="1.8" fill="#1A2E2A"/>
    <!-- Rays -->
    <line x1="0" y1="-4" x2="0" y2="-11" stroke="#1A2E2A" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="3.5" y1="-2.5" x2="9.5" y2="-6.5" stroke="#1A2E2A" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="4" y1="0.5" x2="11" y2="0.5" stroke="#1A2E2A" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="3.5" y1="3" x2="9.5" y2="7.5" stroke="#1A2E2A" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="0" y1="4" x2="0" y2="11" stroke="#1A2E2A" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-3.5" y1="3" x2="-9.5" y2="7.5" stroke="#1A2E2A" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-4" y1="0.5" x2="-11" y2="0.5" stroke="#1A2E2A" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-3.5" y1="-2.5" x2="-9.5" y2="-6.5" stroke="#1A2E2A" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Intermediate rays (shorter) -->
    <line x1="2" y1="-3.5" x2="5.5" y2="-9.5" stroke="#1A2E2A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="-1" x2="10.5" y2="-3" stroke="#1A2E2A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="2" x2="10.5" y2="4.5" stroke="#1A2E2A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="2" y1="3.5" x2="5.5" y2="9.5" stroke="#1A2E2A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-2" y1="3.5" x2="-5.5" y2="9.5" stroke="#1A2E2A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-4" y1="2" x2="-10.5" y2="4.5" stroke="#1A2E2A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-4" y1="-1" x2="-10.5" y2="-3" stroke="#1A2E2A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-2" y1="-3.5" x2="-5.5" y2="-9.5" stroke="#1A2E2A" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- "Panora" text - serif font style -->
  <text x="40" y="28" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="400" fill="#1A2E2A" letter-spacing="-0.5">Panora</text>
</svg>
