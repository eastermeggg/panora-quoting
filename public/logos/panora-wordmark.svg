<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 80" fill="none">
  <!-- Sunburst icon centered at (40, 40) -->
  <g transform="translate(40, 40)" stroke="#1A2E2A" stroke-linecap="round">
    <!-- 16 rays radiating outward from a small gap around center -->
    <line x1="0" y1="-6" x2="0" y2="-26" stroke-width="3.2"/>
    <line x1="4.2" y1="-4.2" x2="17.7" y2="-17.7" stroke-width="2.8"/>
    <line x1="6" y1="0" x2="26" y2="0" stroke-width="3.2"/>
    <line x1="4.2" y1="4.2" x2="17.7" y2="17.7" stroke-width="2.8"/>
    <line x1="0" y1="6" x2="0" y2="26" stroke-width="3.2"/>
    <line x1="-4.2" y1="4.2" x2="-17.7" y2="17.7" stroke-width="2.8"/>
    <line x1="-6" y1="0" x2="-26" y2="0" stroke-width="3.2"/>
    <line x1="-4.2" y1="-4.2" x2="-17.7" y2="-17.7" stroke-width="2.8"/>
    <!-- Intermediate rays -->
    <line x1="2.3" y1="-5.5" x2="10" y2="-24" stroke-width="2.5"/>
    <line x1="5.5" y1="-2.3" x2="24" y2="-10" stroke-width="2.5"/>
    <line x1="5.5" y1="2.3" x2="24" y2="10" stroke-width="2.5"/>
    <line x1="2.3" y1="5.5" x2="10" y2="24" stroke-width="2.5"/>
    <line x1="-2.3" y1="5.5" x2="-10" y2="24" stroke-width="2.5"/>
    <line x1="-5.5" y1="2.3" x2="-24" y2="10" stroke-width="2.5"/>
    <line x1="-5.5" y1="-2.3" x2="-24" y2="-10" stroke-width="2.5"/>
    <line x1="-2.3" y1="-5.5" x2="-10" y2="-24" stroke-width="2.5"/>
  </g>
  <!-- "Panora" in serif -->
  <text x="85" y="57" font-family="Georgia, 'Times New Roman', 'DejaVu Serif', serif" font-size="56" font-weight="400" fill="#1A2E2A" letter-spacing="-1">Panora</text>
</svg>
